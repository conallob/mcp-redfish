version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - misspell
    - unconvert
    - unparam
    - noctx

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/conallob/mcp-redfish

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - unparam
