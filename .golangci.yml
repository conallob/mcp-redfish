version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - exhaustive
    - noctx

linters-settings:
  goimports:
    local-prefixes: github.com/conallob/mcp-redfish

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - errcheck
        - unparam
